<div class="bg-dark h-60">
  <h2
    class="font-open font-bold text-2xl ml-12 pt-8 text-zinc-50 text-left leading-20 md:text-5xl md:ml-24 md:pt-14 lg:text-6xl"
  >
    Nossos Membros
  </h2>

  <p
    class="font-open font-bold text-base ml-12 text-zinc-50 text-left md:ml-24 lg:text-xl"
  >
    conheça quem está participando dessa gestão e fazendo a diferença
  </p>
</div>

<div class="flex flex-col mt-10 lg:flex-row justify-between">

  <!-- Filtro Mobile + Desktop -->
  <div class="relative flex flex-row">

    <button
      type="button"
      class="flex items-center cursor-pointer"
      (click)="alternarMenuFiltro()"
      aria-label="Abrir filtros"
    >
      <img
        class="w-10 h-10 p-2 ml-15"
        src="assets/filtro.svg"
        alt=""
      >

      <span
        class="font-open font-semibold text-base text-left mt-2"
      >
        Filtro por área
      </span>
    </button>

    @if (menuFiltroAberto()) {

      <div
        class="absolute top-12 left-15 z-50 bg-white rounded-md shadow-lg border min-w-64"
      >

        <button
          type="button"
          class="block w-full text-left px-4 py-3 hover:bg-gray-100"
          (click)="selecionarFiltro(null)"
        >
          Todos os membros
        </button>

        <button
          type="button"
          class="block w-full text-left px-4 py-3 hover:bg-gray-100"
          (click)="selecionarFiltro('cultura')"
        >
          Cultura e Eventos
        </button>

        <button
          type="button"
          class="block w-full text-left px-4 py-3 hover:bg-gray-100"
          (click)="selecionarFiltro('comunicacao')"
        >
          Comunicação
        </button>

        
        <button
          type="button"
          class="block w-full text-left px-4 py-3 hover:bg-gray-100"
          (click)="selecionarFiltro('diretoria')"
        >
          Diretoria
        </button>

        <button
          type="button"
          class="block w-full text-left px-4 py-3 hover:bg-gray-100"
          (click)="selecionarFiltro('relacoes')"
        >
          Relações Institucionais
        </button>  

      </div>

    }

  </div>

  <!-- Filtros Desktop -->
  <div
    class="hidden md:flex flex-row gap-1 md:self-end lg:self-auto lg:gap-3"
  >

    <button
      type="button"
      class="flex items-center gap-1 cursor-pointer"
      (click)="selecionarFiltro('cultura')"
    >
      <p
        class="font-open font-semibold text-base lg:text-left lg:ml-12"
      >
        Cultura e Eventos
      </p>

      <img
        class="w-6 h-6"
        src="assets/calendario.svg"
        alt=""
      >
    </button>


     <button
      type="button"
      class="flex items-center gap-1 cursor-pointer"
      (click)="selecionarFiltro('diretoria')"
    >
      <p
        class="font-open font-semibold text-base lg:text-left lg:ml-12"
      >
        Diretoria
      </p>

      <img
        class="w-6 h-6"
        src="assets/diretoria.svg"
        alt=""
      >
    </button>

    <button
      type="button"
      class="flex items-center gap-1 cursor-pointer"
      (click)="selecionarFiltro('comunicacao')"
    >
      <p
        class="font-open font-semibold text-base lg:text-left ml-12"
      >
        Comunicação
      </p>

      <img
        class="w-6 h-6 mr-12"
        src="assets/comunicacao.svg"
        alt=""
      >
    </button>
 
    <button
      type="button"
      class="flex items-center gap-1 cursor-pointer"
      (click)="selecionarFiltro('relacoes')"
    >
   
      <p
        class="font-open font-semibold text-base lg:text-left  "
      >
        Relações Institucionais
      </p>

      <img
        class="w-6 h-6 mr-10"
        src="assets/chapeu.svg"
        alt=""
      >
    </button>  

  </div>

</div>

<main class="bg-white">
  <app-card-membros
    [filtro]="filtroSelecionado()"
  ></app-card-membros>
</main>
